# Railway Configuration
# This file tells Railway how to deploy your application

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
railwayTomlVersion = "2"

[build.env]
NODE_ENV = "production"

# Backend service configuration
[[services]]
id = "backend"
name = "ServiceFlow Backend"
source = "./backend"
tcpProxyApplicationPort = 3000

[services.backend.env]
NODE_ENV = "production"
PORT = "3000"
HOST = "0.0.0.0"
JWT_EXPIRY = "15m"

# Frontend service configuration
[[services]]
id = "frontend"
name = "ServiceFlow Frontend"
source = "./frontend"
tcpProxyApplicationPort = 5173

[services.frontend.env]
NODE_ENV = "production"

# Database service
[[services]]
id = "database"
name = "PostgreSQL Database"
source = "postgresql"